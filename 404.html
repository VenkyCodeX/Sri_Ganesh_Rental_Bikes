<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found – Sri Ganesh Bike Rentals</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .error-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 40px 5%;
    }
    .error-code {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(80px, 20vw, 160px); font-weight: 700;
      color: var(--orange); line-height: 1; opacity: 0.15;
      position: absolute;
    }
    .error-content { position: relative; z-index: 1; }
    .error-icon { font-size: 64px; color: var(--orange); margin-bottom: 20px; }
    .error-content h1 { font-family: 'Rajdhani', sans-serif; font-size: 32px; font-weight: 700; margin-bottom: 12px; }
    .error-content p { color: var(--text-muted); font-size: 16px; margin-bottom: 32px; }
    .error-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-outline {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid var(--border); color: var(--text-muted);
      padding: 12px 24px; border-radius: 10px; font-size: 15px; font-weight: 600;
      transition: all 0.2s ease;
    }
    .btn-outline:hover { border-color: var(--orange); color: var(--orange); }
  </style>
</head>
<body>
<div class="error-page">
  <div class="error-code">404</div>
  <div class="error-content">
    <div class="error-icon"><i class="fas fa-motorcycle"></i></div>
    <h1>Page Not Found</h1>
    <p>Looks like this road doesn't exist. Let's get you back on track.</p>
    <div class="error-actions">
      <a href="index.html" class="btn-primary"><i class="fas fa-home"></i> Go Home</a>
      <a href="bikes.html" class="btn-outline"><i class="fas fa-motorcycle"></i> Browse Bikes</a>
    </div>
  </div>
</div>
</body>
</html>
